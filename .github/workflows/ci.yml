name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  go:
    name: Go verification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1 -timeout 5m

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build ./cmd/devflow

      - name: Check whitespace
        run: git diff --check